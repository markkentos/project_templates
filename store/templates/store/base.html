{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Anime Shelf{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'store/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'store:home' %}">
            <span class="brand-mark">AS</span>
            <span>Anime Shelf</span>
        </a>
        <nav class="main-nav">
            <a href="{% url 'store:product_list' %}">Каталог</a>
            <a href="{% url 'store:catalog_tree' %}">Дерево</a>
            <a href="{% url 'store:patterns_demo' %}">Паттерны</a>
            <a class="cart-link" href="{% url 'store:cart' %}">Корзина <span>{{ cart_items_count }}</span></a>
        </nav>
    </header>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
